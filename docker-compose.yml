# Full local stack: Postgres + API + (optional) frontend static build notes.
#
#   docker compose up -d db
#   # or full stack once images are built:
#   docker compose up --build
#
# Point backend DATABASE_URL at:
#   postgresql+psycopg2://qms:qms@localhost:5432/complaints
# (or @db:5432 from another compose service)

services:
  db:
    image: postgres:16
    container_name: pharmaqms-db
    environment:
      POSTGRES_USER: qms
      POSTGRES_PASSWORD: qms
      POSTGRES_DB: complaints
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qms -d complaints"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharmaqms-api
    environment:
      DATABASE_URL: postgresql+psycopg2://qms:qms@db:5432/complaints
      FRONTEND_ORIGIN: http://localhost:5173
      SYNC_PROCESSING: "false"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - full

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pharmaqms-web
    ports:
      - "5173:80"
    depends_on:
      - api
    profiles:
      - full

volumes:
  pgdata:
